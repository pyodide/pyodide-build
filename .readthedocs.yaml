version: 2

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

formats: []

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
    uv: latest
  jobs:
    install:
      - uv sync --group docs
    build:
      html:
        - uv run sphinx-build -T -E -b html docs/ $READTHEDOCS_OUTPUT/html
